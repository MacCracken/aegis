name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Cyrius toolchain
        # Lays out ~/.cyrius/versions/<VERSION>/{bin,lib} and symlinks
        # ~/.cyrius/{bin,lib} -> versions/<VERSION>/{bin,lib}. cc5 5.10.9+
        # resolves arch-peer includes (e.g. syscalls_x86_64_linux.cyr)
        # against the version-pinned path; the un-versioned ~/.cyrius/lib
        # layout that worked pre-5.10.9 no longer finds peer files.
        run: |
          CYRIUS_VERSION="${CYRIUS_VERSION:-$(grep -oP '(?<=^cyrius = ")[^"]+' cyrius.cyml)}"
          echo "Installing Cyrius $CYRIUS_VERSION"
          curl -sLO "https://github.com/MacCracken/cyrius/releases/download/$CYRIUS_VERSION/cyrius-$CYRIUS_VERSION-x86_64-linux.tar.gz"
          tar xzf "cyrius-$CYRIUS_VERSION-x86_64-linux.tar.gz"
          CYRIUS_DIR="cyrius-$CYRIUS_VERSION-x86_64-linux"
          VERSIONED="$HOME/.cyrius/versions/$CYRIUS_VERSION"
          mkdir -p "$VERSIONED/bin" "$VERSIONED/lib"
          cp "$CYRIUS_DIR/bin/"* "$VERSIONED/bin/" 2>/dev/null || true
          cp -r "$CYRIUS_DIR/lib/"* "$VERSIONED/lib/" 2>/dev/null || true
          chmod +x "$VERSIONED/bin/"* 2>/dev/null || true
          ln -sfn "$VERSIONED/bin" "$HOME/.cyrius/bin"
          ln -sfn "$VERSIONED/lib" "$HOME/.cyrius/lib"
          echo "$CYRIUS_VERSION" > "$HOME/.cyrius/current"
          echo "$HOME/.cyrius/bin" >> $GITHUB_PATH
          echo "CYRIUS_HOME=$HOME/.cyrius" >> $GITHUB_ENV

      - name: Verify toolchain
        # Must be a separate step — `>> $GITHUB_PATH` only takes effect
        # on subsequent steps, so inlining `cc5 --version` after the
        # path append in the install step would still use the runner's
        # original PATH and report "cc5: command not found".
        run: cc5 --version

      - name: Resolve dependencies
        # Must run before any step that resolves `include "lib/..."`
        # (syntax check, fmt, lint, vet, build). `./lib/` is gitignored
        # — `cyrius deps` populates it from the version-pinned stdlib
        # snapshot + agnostik tag. Matches yukti/patra/agnosys convention.
        run: cyrius deps

      - name: Syntax check
        # `cyrius check` defaults to standalone — without --with-deps
        # it can't see stdlib enums (e.g. STAT_MODE from
        # lib/syscalls_x86_64_linux.cyr). Run after `cyrius deps` so
        # the manifest's stdlib modules are present in lib/.
        run: |
          for f in src/*.cyr; do
            cyrius check --with-deps "$f"
          done

      - name: Verify dep hashes
        # Skip on the first push that introduces a new dep before
        # `cyrius.lock` has been generated and committed.
        run: |
          if [ -f cyrius.lock ]; then
            cyrius deps --verify
          else
            echo "::warning::cyrius.lock not committed — skipping hash verification"
          fi

      - name: Format check
        # cyrius fmt <file> emits the formatted source to stdout; diff
        # against the committed file to enforce no drift.
        run: |
          fail=0
          for f in src/*.cyr tests/*.tcyr tests/*.bcyr tests/*.fcyr; do
            [ -f "$f" ] || continue
            if ! diff -q <(cyrius fmt "$f" 2>/dev/null) "$f" > /dev/null; then
              echo "needs fmt: $f"
              fail=1
            fi
          done
          [ $fail -eq 0 ] || { echo "fmt: drift detected"; exit 1; }

      - name: Lint
        # Auto-discover so new files are covered without editing CI.
        # Treat any warning as a failure.
        run: |
          fail=0
          for f in src/*.cyr tests/*.tcyr tests/*.bcyr tests/*.fcyr; do
            [ -f "$f" ] || continue
            out=$(cyrius lint "$f" 2>&1)
            echo "$out"
            if echo "$out" | grep -qE '^\s*warn '; then
              fail=1
            fi
          done
          [ $fail -eq 0 ] || { echo "lint: warnings present"; exit 1; }

      - name: Vet (include-graph audit)
        run: cyrius vet src/main.cyr

      - name: Build (DCE)
        run: |
          mkdir -p build
          CYRIUS_DCE=1 cyrius build src/main.cyr build/aegis
          echo "aegis: $(wc -c < build/aegis) bytes"

      - name: Verify ELF
        run: xxd -l 4 build/aegis | grep -q "7f45 4c46"

      - name: Cross-build aarch64
        # The toolchain translates x86_64 syscall numbers to aarch64
        # at codegen — no aegis source changes needed. If the
        # toolchain bundle didn't ship cc5_aarch64, skip with a warning.
        run: |
          if [ ! -x "$HOME/.cyrius/bin/cc5_aarch64" ]; then
            echo "::warning::cc5_aarch64 not shipped with Cyrius — skipping aarch64 cross-build"
            exit 0
          fi
          CYRIUS_DCE=1 cyrius build --aarch64 src/main.cyr build/aegis-aarch64
          file build/aegis-aarch64 | grep -q "aarch64" || {
            echo "ERROR: build/aegis-aarch64 is not an aarch64 ELF"; exit 1; }
          echo "aegis-aarch64: $(wc -c < build/aegis-aarch64) bytes"

      - name: Smoke test
        run: |
          ./build/aegis | tee /tmp/smoke_output
          grep -q "aegis ready" /tmp/smoke_output

      - name: Tests
        run: |
          for t in tests/*.tcyr; do
            [ -f "$t" ] || continue
            name=$(basename "$t" .tcyr)
            echo "=== $name ==="
            CYRIUS_DCE=1 cyrius build "$t" "/tmp/ci_$name"
            "/tmp/ci_$name"
            rm -f "/tmp/ci_$name"
          done

      - name: Fuzz
        run: |
          for f in tests/*.fcyr; do
            [ -f "$f" ] || continue
            name=$(basename "$f" .fcyr)
            CYRIUS_DCE=1 cyrius build "$f" "build/$name"
            timeout 10 "build/$name" || { echo "FUZZ CRASH: $name"; exit 1; }
            echo "  $name: ok"
          done

      - name: Benchmarks
        run: |
          for b in tests/*.bcyr; do
            [ -f "$b" ] || continue
            name=$(basename "$b" .bcyr)
            CYRIUS_DCE=1 cyrius build "$b" "build/$name"
            "build/$name"
          done

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan for dangerous patterns
        # Matches code lines only — rejects patterns in # comments.
        run: |
          FAIL=0
          scan() {
            local label="$1"; shift
            local pat="$1"; shift
            local hits
            hits=$(grep -rn "$pat" src/ 2>/dev/null | awk -F: '
              { line=$3; for(i=4;i<=NF;i++) line=line":"$i;
                sub(/^[[:space:]]+/,"",line);
                if (substr(line,1,1) != "#") print $1":"$2":"line }')
            if [ -n "$hits" ]; then
              echo "FAIL: $label"
              echo "$hits"
              FAIL=1
            fi
          }
          # Raw execve(59) — aegis enforces policy, doesn't fork
          scan "raw execve"     'syscall( *59'
          # Direct shadow file access — aegis isn't an auth daemon
          scan "shadow access"  '"/etc/shadow"'
          # Writes to system paths
          scan "writes to /bin"  '"/bin/'
          scan "writes to /sbin" '"/sbin/'
          # Unbounded fn-scope buffers — cyrius emits `var buf[N]`
          # inside functions as static data; consecutive calls share
          # the backing memory. Surface anything >= 4 KB; >= 64 KB fails.
          awk -F: '
            /var [A-Za-z_][A-Za-z0-9_]*\[[0-9]+\]/ {
              match($0, /\[[0-9]+\]/); s=substr($0,RSTART+1,RLENGTH-2); n=s+0;
              if (n >= 65536) print FILENAME":"NR": FAIL large static buffer ("n" bytes): "$0
              else if (n >= 4096) print FILENAME":"NR": warn fn-scope buffer ("n" bytes): "$0
            }' src/*.cyr | tee /tmp/bigbuf.txt
          if grep -q "^.*: FAIL " /tmp/bigbuf.txt; then FAIL=1; fi
          echo "security scan complete (fail: $FAIL)"
          exit $FAIL

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check required docs
        run: |
          MISSING=0
          for doc in README.md CHANGELOG.md VERSION CONTRIBUTING.md SECURITY.md CODE_OF_CONDUCT.md LICENSE cyrius.cyml; do
            if [ -f "$doc" ]; then echo "  OK: $doc"; else echo "  MISSING: $doc"; MISSING=1; fi
          done
          exit $MISSING

      - name: Verify version consistency
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          echo "VERSION file: $VERSION"
          grep -q "$VERSION" CHANGELOG.md || { echo "FAIL: version not in CHANGELOG.md"; exit 1; }
          grep -q '^version = "\${file:VERSION}"' cyrius.cyml || {
            echo "FAIL: cyrius.cyml version must be \${file:VERSION}"; exit 1; }
          echo "Version consistent (manifest pulls VERSION via \${file:VERSION})"
