name: Release

on:
  push:
    # Accept both `v1.2.3` and `1.2.3` tag styles. The version-verify
    # step below enforces semver shape + match against VERSION file.
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - '[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  ci:
    name: CI Gate
    uses: ./.github/workflows/ci.yml

  build:
    name: Build Release
    needs: [ci]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify version
        run: |
          FILE_VERSION=$(cat VERSION | tr -d '[:space:]')
          TAG="${GITHUB_REF_NAME#v}"   # strip optional leading 'v' so v1.0.1 == 1.0.1
          echo "$TAG" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$' || {
            echo "tag ($TAG) is not semver x.y.z"; exit 1; }
          [ "$FILE_VERSION" = "$TAG" ] || {
            echo "VERSION ($FILE_VERSION) != tag ($TAG)"; exit 1; }
          grep -q '^version = "\${file:VERSION}"' cyrius.cyml || {
            echo "cyrius.cyml version must be \${file:VERSION}"; exit 1; }
          echo "Version verified: $TAG"

      - name: Install Cyrius toolchain
        # Version-pinned layout — cc5 5.10.9+ resolves arch-peer includes
        # (syscalls_x86_64_linux.cyr etc.) under ~/.cyrius/versions/<V>/lib.
        run: |
          CYRIUS_VERSION="${CYRIUS_VERSION:-$(grep -oP '(?<=^cyrius = ")[^"]+' cyrius.cyml)}"
          echo "Installing Cyrius $CYRIUS_VERSION"
          curl -sLO "https://github.com/MacCracken/cyrius/releases/download/$CYRIUS_VERSION/cyrius-$CYRIUS_VERSION-x86_64-linux.tar.gz"
          tar xzf "cyrius-$CYRIUS_VERSION-x86_64-linux.tar.gz"
          CYRIUS_DIR="cyrius-$CYRIUS_VERSION-x86_64-linux"
          VERSIONED="$HOME/.cyrius/versions/$CYRIUS_VERSION"
          mkdir -p "$VERSIONED/bin" "$VERSIONED/lib"
          cp "$CYRIUS_DIR/bin/"* "$VERSIONED/bin/" 2>/dev/null || true
          cp -r "$CYRIUS_DIR/lib/"* "$VERSIONED/lib/" 2>/dev/null || true
          chmod +x "$VERSIONED/bin/"* 2>/dev/null || true
          ln -sfn "$VERSIONED/bin" "$HOME/.cyrius/bin"
          ln -sfn "$VERSIONED/lib" "$HOME/.cyrius/lib"
          echo "$CYRIUS_VERSION" > "$HOME/.cyrius/current"
          echo "$HOME/.cyrius/bin" >> $GITHUB_PATH
          echo "CYRIUS_HOME=$HOME/.cyrius" >> $GITHUB_ENV
          cc5 --version

      - name: Resolve deps
        run: cyrius deps

      - name: Verify dep hashes
        run: |
          if [ -f cyrius.lock ]; then
            cyrius deps --verify
          else
            echo "::warning::cyrius.lock not committed — skipping hash verification"
          fi

      - name: Build (DCE)
        run: |
          mkdir -p build
          CYRIUS_DCE=1 cyrius build src/main.cyr build/aegis
          echo "aegis: $(wc -c < build/aegis) bytes"

      - name: Cross-build aarch64 (best-effort)
        run: |
          if [ -x "$HOME/.cyrius/bin/cc5_aarch64" ]; then
            CYRIUS_DCE=1 cyrius build --aarch64 src/main.cyr build/aegis-aarch64
            echo "aegis-aarch64: $(wc -c < build/aegis-aarch64) bytes"
          else
            echo "::warning::cc5_aarch64 not in toolchain — aarch64 binary skipped"
          fi

      - name: Tests
        run: |
          for t in tests/*.tcyr; do
            [ -f "$t" ] || continue
            name=$(basename "$t" .tcyr)
            echo "=== $name ==="
            CYRIUS_DCE=1 cyrius build "$t" "/tmp/rel_$name"
            "/tmp/rel_$name"
            rm -f "/tmp/rel_$name"
          done

      - name: Fuzz
        run: |
          for f in tests/*.fcyr; do
            [ -f "$f" ] || continue
            name=$(basename "$f" .fcyr)
            CYRIUS_DCE=1 cyrius build "$f" "build/$name"
            timeout 10 "build/$name" || { echo "FUZZ CRASH: $name"; exit 1; }
            echo "  $name: ok"
          done

      - name: Clean toolchain artifacts
        run: rm -f cyrius-*.tar.gz

      - name: Archive
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          git archive --format=tar.gz --prefix="aegis-${TAG}/" -o "aegis-${TAG}-src.tar.gz" HEAD
          # Ship src/lib.cyr separately so consumers can grab just
          # the library surface without unpacking the source tarball.
          cp src/lib.cyr "aegis-${TAG}-lib.cyr"
          if [ -f build/aegis ]; then
            cp build/aegis "aegis-${TAG}-x86_64-linux"
          fi
          if [ -f build/aegis-aarch64 ]; then
            cp build/aegis-aarch64 "aegis-${TAG}-aarch64-linux"
          fi
          sha256sum aegis-*.tar.gz aegis-*.cyr aegis-*-linux 2>/dev/null > SHA256SUMS

      - uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: |
            aegis-*.tar.gz
            aegis-*.cyr
            aegis-*-linux
            cyrius.lock
            SHA256SUMS

  release:
    name: Create GitHub Release
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: release-artifacts
      - name: Changelog
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          awk "/^## \\[${TAG}\\]/{found=1; next} /^## \\[/{if(found) exit} found{print}" CHANGELOG.md > /tmp/body.md
      - uses: softprops/action-gh-release@v2
        with:
          name: "aegis ${{ github.ref_name }}"
          body_path: /tmp/body.md
          prerelease: ${{ startsWith(github.ref_name, '0.') || startsWith(github.ref_name, 'v0.') }}
          files: |
            aegis-*.tar.gz
            aegis-*.cyr
            aegis-*-linux
            cyrius.lock
            SHA256SUMS
